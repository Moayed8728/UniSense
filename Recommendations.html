<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UniSense — Your recommendations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="unisense.css">
<style>
  .rec-head{
    max-width:1080px; margin:0 auto 12px;
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:18px;
  }
  .rec-head h1{
    font-size:42px; letter-spacing:-0.02em; margin:0;
  }
  .rec-head .lede{ color:var(--muted); margin:4px 0 0; max-width:560px;}
  .rec-head .regen{
    appearance:none; border:1px solid var(--line-2);
    background:var(--paper);
    padding:11px 16px;
    border-radius:11px;
    font:600 13px/1 var(--sans); color:var(--ink-2);
    cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
  }
  .rec-head .regen:hover{ border-color:var(--accent); color:var(--accent);}
  .rec-head .regen svg{ width:14px; height:14px;}

  .criteria-strip{
    max-width:1080px; margin:18px auto 24px;
    display:flex; flex-wrap:wrap; gap:8px;
    align-items:center;
  }
  .criteria-strip .label{
    font-size:11.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); margin-right:4px;
  }
  .criteria-chip{
    display:inline-flex; align-items:center; gap:7px;
    padding:8px 12px;
    background:#22191b;
    color:#f6f1e9;
    border-radius:9px;
    font-size:12.5px; font-weight:600;
  }
  .criteria-chip svg{ width:12px; height:12px; opacity:.85;}
  .criteria-edit{
    appearance:none; border:0; background:transparent;
    font-size:12.5px; color:var(--accent);
    font-weight:600;
    cursor:pointer;
    padding:8px 10px;
    border-radius:8px;
    display:inline-flex; align-items:center; gap:5px;
  }
  .criteria-edit:hover{ background:var(--accent-tint);}
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="recommendations.jsx"></script>
</body>
</html>
