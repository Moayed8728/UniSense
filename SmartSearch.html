<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UniSense — Search: software</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="unisense.css">
<style>
  .also-card{
    max-width:1080px; margin:18px auto 24px;
    background:var(--paper);
    border:1px solid rgba(25,21,18,.06);
    border-radius:16px;
    padding:18px 22px;
    box-shadow: 0 1px 0 rgba(255,255,255,.9) inset;
  }
  .also-head{
    display:flex; align-items:center; gap:10px;
    margin-bottom:12px;
  }
  .also-head .ico{
    width:30px; height:30px; border-radius:9px;
    background:var(--accent-tint); color:var(--accent);
    display:grid; place-items:center;
    flex-shrink:0;
  }
  .also-head .ico svg{ width:15px; height:15px; }
  .also-head h2{
    font-family:var(--serif); font-weight:400;
    font-size:18px; margin:0; letter-spacing:-0.01em;
  }
  .also-head .sub{ font-size:12.5px; color:var(--muted); margin-left:auto;}
  .also-chips{ display:flex; flex-wrap:wrap; gap:8px;}
  .also-chip{
    appearance:none;
    background:#fbf8f3;
    border:1px solid var(--line);
    color:var(--ink-2);
    padding:9px 14px;
    border-radius:999px;
    font:600 13px/1 var(--sans);
    cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition: background .15s, border-color .15s, color .15s;
  }
  .also-chip:hover{
    background:var(--paper);
    border-color:var(--accent);
    color:var(--accent);
  }
  .also-chip .count{
    font-size:11px;
    color:var(--muted);
    padding:2px 7px;
    background:rgba(25,21,18,.05);
    border-radius:999px;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .also-chip:hover .count{
    background:var(--accent-tint);
    color:var(--accent);
  }
  .also-chip svg{ width:11px; height:11px; opacity:.7;}

  .search-result-head{
    max-width:1080px; margin:24px auto 14px;
    display:flex; align-items:baseline; justify-content:space-between;
    gap:18px;
  }
  .search-result-head h2{
    font-family:var(--serif); font-weight:400;
    font-size:32px; margin:0; letter-spacing:-0.015em;
  }
  .search-result-head h2 em{ font-style:italic; color:var(--accent);}
  .search-result-head .count{
    font-size:14px; color:var(--muted); font-weight:500;
  }
  .search-result-head .count b{ color:var(--ink); font-weight:700;}
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="search.jsx"></script>
</body>
</html>
