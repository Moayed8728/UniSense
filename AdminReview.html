<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UniSense — Admin · Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="unisense.css">
<style>
  .adm-head{
    max-width:1280px; margin:0 auto 24px;
    display:flex; align-items:flex-end; justify-content:space-between;
  }
  .adm-head h1{ font-size:36px; margin:0; letter-spacing:-0.02em;}
  .adm-head .sub{ color:var(--muted); font-size:14px; margin-top:4px;}
  .adm-head .meta{
    display:flex; align-items:center; gap:14px;
    font-size:12.5px; color:var(--muted);
  }
  .adm-head .meta b{ color:var(--ink); font-weight:600;}

  /* KPIs */
  .kpis{
    max-width:1280px; margin:0 auto 24px;
    display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;
  }
  .kpi{
    background:var(--paper);
    border:1px solid rgba(25,21,18,.06);
    border-radius:16px;
    padding:22px 24px;
    display:flex; flex-direction:column; gap:6px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 1px 0 rgba(255,255,255,.9) inset, 0 1px 2px rgba(25,21,18,.04);
  }
  .kpi .lbl{
    font-size:11.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .kpi .lbl .ic{
    width:22px; height:22px; border-radius:7px;
    display:grid; place-items:center;
  }
  .kpi.pending  .lbl .ic{ background:var(--accent-tint); color:var(--accent);}
  .kpi.approved .lbl .ic{ background:rgba(44,141,74,.14); color:#1f6634;}
  .kpi.rejected .lbl .ic{ background:rgba(165,40,40,.10); color:#a52828;}
  .kpi .lbl .ic svg{ width:13px; height:13px;}
  .kpi .val{
    font-family:var(--serif);
    font-size:54px; line-height:1; letter-spacing:-0.02em;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  .kpi .delta{
    font-size:12px; font-weight:600;
    color:var(--ok);
    display:inline-flex; align-items:center; gap:5px;
  }
  .kpi.pending .delta{ color:var(--accent);}
  .kpi .delta svg{width:11px;height:11px}
  .kpi .delta .grey{ color:var(--muted); font-weight:500; margin-left:4px;}

  /* Page split */
  .adm-split{
    max-width:1280px; margin:0 auto;
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    gap:22px;
    align-items:flex-start;
  }

  /* Submissions list */
  .sub-card{
    background:var(--paper);
    border:1px solid rgba(25,21,18,.06);
    border-radius:16px;
    padding:18px 20px;
    display:grid;
    grid-template-columns: 40px 1fr auto;
    gap:14px;
    align-items:center;
    cursor:pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .sub-card:hover{ border-color:rgba(25,21,18,.18);}
  .sub-card.active{
    border-color:var(--accent);
    box-shadow: 0 0 0 4px var(--accent-ring);
  }
  .sub-card .badge-num{
    width:40px; height:40px; border-radius:10px;
    background:#22191b; color:#fff;
    display:grid; place-items:center;
    font-family:var(--serif); font-size:16px;
  }
  .sub-card .body{ min-width:0;}
  .sub-card .title{
    font-family:var(--serif); font-size:18px; line-height:1.2;
    margin:0 0 4px; letter-spacing:-0.01em;
  }
  .sub-card .meta{
    font-size:12.5px; color:var(--muted);
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  }
  .sub-card .meta svg{ width:11px; height:11px;}
  .sub-card .meta b{ color:var(--ink-2); font-weight:600;}
  .sub-card .src-row{
    margin-top:8px;
    display:flex; align-items:center; gap:8px;
    font-size:11.5px;
  }
  .src-status{
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 8px; border-radius:6px;
    font-weight:700; letter-spacing:.04em; font-size:10.5px;
    text-transform:uppercase;
  }
  .src-status.ok   { background:rgba(44,141,74,.14); color:#1f6634;}
  .src-status.warn { background:rgba(168,98,32,.14); color:#a86220;}
  .src-status.fail { background:rgba(165,40,40,.10); color:#a52828;}
  .src-status svg{ width:10px; height:10px;}
  .sub-card .review{
    appearance:none; border:0;
    background:var(--accent); color:#fff;
    padding:11px 16px;
    border-radius:10px;
    font:600 12.5px/1 var(--sans);
    cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    box-shadow: 0 6px 14px -6px rgba(192,0,0,.5);
  }
  .sub-card .review:hover{ background:#a80000;}
  .sub-card .review svg{ width:12px; height:12px;}

  /* Review detail */
  .rev-card{
    background:var(--paper);
    border:1px solid rgba(25,21,18,.06);
    border-radius:18px;
    padding:0;
    overflow:hidden;
    position:sticky;
    top:84px;
    box-shadow: 0 1px 0 rgba(255,255,255,.9) inset, 0 1px 2px rgba(25,21,18,.04), 0 20px 40px -28px rgba(25,21,18,.20);
  }
  .rev-head{
    padding:24px 28px 18px;
    border-bottom:1px solid var(--line);
    background:#faf6ee;
  }
  .rev-head .ttl-row{
    display:flex; align-items:flex-start; gap:14px;
    margin-bottom:10px;
  }
  .rev-head .um{
    width:48px; height:48px; border-radius:11px;
    background:#22191b; color:#fff;
    display:grid; place-items:center;
    font-family:var(--serif); font-size:18px;
    flex-shrink:0;
  }
  .rev-head h2{
    font-family:var(--serif); font-weight:400;
    font-size:22px; margin:0 0 4px; letter-spacing:-0.01em;
  }
  .rev-head .um-name{
    font-size:13px; color:var(--ink-2);
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  }
  .rev-head .um-name svg{ width:11px; height:11px;}
  .rev-head .um-name .dot{ width:3px; height:3px; border-radius:50%; background:var(--muted-2);}
  .rev-summary{
    margin:8px 0 0;
    font-size:13.5px; color:var(--ink-2); line-height:1.55;
  }
  .rev-summary p{ margin:0;}

  .rev-section{ padding:20px 28px; border-bottom:1px solid var(--line);}
  .rev-section:last-of-type{ border-bottom:0;}
  .rev-section h3{
    font-size:11.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin:0 0 12px;
  }

  .src-link-card{
    display:flex; align-items:center; gap:14px;
    padding:12px 14px;
    background:#fbf8f3;
    border:1px solid var(--line);
    border-radius:11px;
    margin-bottom:10px;
  }
  .src-link-card:last-child{ margin-bottom:0;}
  .src-link-card .lkico{
    width:32px; height:32px; border-radius:8px;
    background:#22191b; color:#fff;
    display:grid; place-items:center;
    flex-shrink:0;
  }
  .src-link-card .lkico svg{ width:14px; height:14px;}
  .src-link-card .lk-meta{ flex:1; min-width:0;}
  .src-link-card .lk-lbl{
    font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:2px;
  }
  .src-link-card .lk-url{
    font-size:12.5px; color:var(--ink); font-weight:500;
    word-break: break-all;
  }
  .src-link-card .lk-actions{ display:flex; gap:6px; flex-shrink:0;}
  .src-link-card .lk-actions button{
    appearance:none; border:1px solid var(--line-2);
    background:var(--paper);
    padding:7px 11px; border-radius:8px;
    font:600 12px/1 var(--sans); color:var(--ink-2);
    cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
  }
  .src-link-card .lk-actions button:hover{ border-color:var(--muted-2); color:var(--ink);}
  .src-link-card .lk-actions .verify{ background:rgba(44,141,74,.12); color:#1f6634; border-color:rgba(44,141,74,.22);}
  .src-link-card .lk-actions .verify:hover{ background:rgba(44,141,74,.20);}
  .src-link-card .lk-actions svg{ width:11px; height:11px;}

  /* Decision */
  .decision{
    display:flex; flex-direction:column; gap:10px;
  }
  .decision-row{
    display:flex; gap:10px;
  }
  .decision-card{
    flex:1;
    border:1.5px solid var(--line);
    background:#fbf8f3;
    padding:14px 16px;
    border-radius:12px;
    cursor:pointer;
    display:flex; align-items:flex-start; gap:12px;
    transition: all .15s;
    position:relative;
  }
  .decision-card:hover{ border-color:var(--line-2);}
  .decision-card.selected.approve{
    border-color:var(--ok); background:rgba(44,141,74,.06);
  }
  .decision-card.selected.reject{
    border-color:var(--accent); background:var(--accent-tint);
  }
  .decision-card .radio{
    width:18px; height:18px; border-radius:50%;
    border:2px solid var(--line-2);
    flex-shrink:0; margin-top:2px;
    display:grid; place-items:center;
    transition:border-color .15s;
  }
  .decision-card .radio::after{
    content:""; width:8px; height:8px; border-radius:50%;
    background:transparent; transition:background .15s;
  }
  .decision-card.selected.approve .radio{ border-color:var(--ok);}
  .decision-card.selected.approve .radio::after{ background:var(--ok);}
  .decision-card.selected.reject .radio{ border-color:var(--accent);}
  .decision-card.selected.reject .radio::after{ background:var(--accent);}
  .decision-card .body{ flex:1; min-width:0;}
  .decision-card .ttl{
    font-size:13.5px; font-weight:700; color:var(--ink);
    display:flex; align-items:center; gap:7px;
    margin-bottom:2px;
  }
  .decision-card .ttl svg{ width:13px; height:13px;}
  .decision-card.approve .ttl svg{ color:var(--ok);}
  .decision-card.reject .ttl svg{ color:var(--accent);}
  .decision-card .ds{ font-size:12px; color:var(--muted); line-height:1.4;}

  .reason{
    display:none;
    margin-top:4px;
  }
  .reason.shown{ display:block;}
  .reason textarea{
    width:100%;
    border:1px solid var(--line);
    background:#fbf8f3;
    border-radius:11px;
    padding:12px 14px;
    font:500 13.5px/1.5 var(--sans);
    color:var(--ink); resize:vertical; min-height:80px;
  }
  .reason textarea:focus{ outline:0; border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-ring);}

  .rev-foot{
    padding:20px 28px;
    display:flex; align-items:center; gap:12px;
    background:#faf6ee;
    border-top:1px solid var(--line);
  }
  .rev-foot .ghost-btn{
    appearance:none; border:1px solid var(--line-2);
    background:var(--paper);
    padding:11px 16px; border-radius:10px;
    font:600 13px/1 var(--sans); color:var(--ink-2);
    cursor:pointer;
  }
  .rev-foot .ghost-btn:hover{ border-color:var(--muted-2); color:var(--ink);}
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
</body>
</html>
