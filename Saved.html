<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UniSense — Saved programmes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="unisense.css">
<style>
  .saved-head{
    max-width:1080px; margin:0 auto 26px;
    display:flex; align-items:flex-end; justify-content:space-between;
  }
  .saved-head h1{ font-size:42px; margin:0; letter-spacing:-0.02em;}
  .saved-head .lede{ color:var(--muted); margin:4px 0 0;}

  .saved-card{
    position:relative;
    background:var(--paper);
    border:1px solid rgba(25,21,18,.06);
    border-radius:16px;
    padding:22px 24px 22px 64px;
    display:grid;
    grid-template-columns: 56px 1fr auto;
    gap:18px;
    align-items:center;
    transition:border-color .15s, box-shadow .15s;
  }
  .saved-card:hover{
    border-color:rgba(25,21,18,.12);
    box-shadow: 0 1px 2px rgba(25,21,18,.04), 0 14px 30px -20px rgba(25,21,18,.16);
  }
  .saved-card.selected{
    border-color:var(--accent);
    box-shadow: 0 0 0 4px var(--accent-ring);
  }
  .saved-check{
    position:absolute; left:22px; top:50%; transform:translateY(-50%);
  }
  .saved-card .uni-mark{
    width:56px; height:56px; border-radius:11px;
    background:#f4ede1; color:var(--ink-2);
    display:grid; place-items:center;
    font-family:var(--serif); font-size:20px;
    border:1px solid var(--line);
  }
  .saved-card .body{ min-width:0;}
  .saved-card .title{
    font-family:var(--serif); font-size:20px;
    margin:0 0 4px; letter-spacing:-0.01em;
  }
  .saved-card .meta{
    font-size:13px; color:var(--ink-2);
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    margin-bottom:8px;
  }
  .saved-card .meta .country{ color:var(--muted);}
  .saved-card .meta .dot{ width:3px; height:3px; border-radius:50%; background:var(--muted-2);}
  .saved-card .savedate{
    font-size:11.5px; color:var(--muted);
    display:inline-flex; align-items:center; gap:6px;
  }
  .saved-card .savedate svg{ width:11px; height:11px;}

  .saved-actions{
    display:flex; align-items:center; gap:8px;
  }
  .saved-actions .btn-view{ padding:11px 16px; font-size:13px;}
  .saved-actions .icon-btn-line{
    appearance:none;
    background:transparent;
    border:1px solid var(--line-2);
    color:var(--ink-2);
    width:38px; height:38px;
    border-radius:10px;
    cursor:pointer;
    display:grid; place-items:center;
    transition: background .15s, color .15s, border-color .15s;
  }
  .saved-actions .icon-btn-line:hover{ background:#fbf8f3; color:var(--ink); border-color:var(--muted-2);}
  .saved-actions .icon-btn-line.danger:hover{ background:#fdecec; color:var(--accent); border-color:var(--accent);}
  .saved-actions .icon-btn-line svg{ width:15px; height:15px;}

  .saved-actions .compare-add{
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 14px;
    background:#fbf8f3; border:1px solid var(--line-2);
    border-radius:10px;
    font:600 13px/1 var(--sans); color:var(--ink-2);
    cursor:pointer;
  }
  .saved-actions .compare-add:hover{ background:#fff; border-color:var(--accent); color:var(--accent);}
  .saved-actions .compare-add svg{ width:13px; height:13px;}

  /* Sticky bottom bar */
  .compare-bar{
    position:sticky; bottom:0;
    background:rgba(34,25,27,.96);
    -webkit-backdrop-filter:blur(16px);
    backdrop-filter:blur(16px);
    border-top:1px solid rgba(255,255,255,.06);
    padding:16px 24px;
    margin: 32px -32px -80px;
    display:flex; align-items:center; gap:18px;
    z-index:20;
    color:#f6f1e9;
  }
  .compare-bar .meta{ font-size:13.5px; }
  .compare-bar .meta b{ color:#fff; font-weight:700;}
  .compare-bar .meta .sub{ color:rgba(255,255,255,.55); margin-left:8px;}
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="saved.jsx"></script>
</body>
</html>
