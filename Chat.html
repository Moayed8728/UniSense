<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UniSense — Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="unisense.css">
<style>
  .chat-shell{
    display:grid;
    grid-template-columns: 280px 1fr;
    max-width:1280px;
    margin:0 auto;
    height: calc(100vh - 65px);
    min-height: 720px;
  }

  /* Sidebar */
  .chat-side{
    border-right:1px solid var(--line);
    background: rgba(255,255,255,.5);
    padding:22px 16px;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:18px;
  }
  .chat-new{
    appearance:none; border:0;
    background:var(--accent); color:#fff;
    padding:12px 14px;
    border-radius:11px;
    font:600 13.5px/1 var(--sans);
    cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 8px 18px -8px rgba(192,0,0,.55);
  }
  .chat-new:hover{ background:#a80000;}
  .chat-new svg{ width:14px; height:14px;}

  .chat-search{
    position:relative;
  }
  .chat-search input{
    width:100%;
    background:#fbf8f3;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px 10px 36px;
    font:500 13px/1 var(--sans);
    color:var(--ink);
  }
  .chat-search input:focus{ outline:0; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring);}
  .chat-search svg{
    position:absolute; left:11px; top:50%; transform:translateY(-50%);
    width:14px; height:14px; color:var(--muted-2);
  }

  .side-group{ display:flex; flex-direction:column; gap:4px;}
  .side-group .ghead{
    font-size:10.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); padding:6px 10px;
  }
  .side-item{
    appearance:none; border:0; background:transparent;
    text-align:left;
    padding:10px 12px;
    border-radius:9px;
    cursor:pointer;
    display:flex; flex-direction:column; gap:3px;
    transition: background .15s;
  }
  .side-item:hover{ background:rgba(25,21,18,.05);}
  .side-item.active{
    background:var(--paper);
    border:1px solid var(--line);
    box-shadow: 0 1px 2px rgba(25,21,18,.04);
  }
  .side-item .ttl{ font-size:13.5px; font-weight:600; color:var(--ink); line-height:1.3;}
  .side-item .meta{ font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .side-item .meta svg{ width:10px; height:10px;}
  .side-item.active .ttl::before{
    content:""; display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--accent); margin-right:7px; vertical-align:middle;
  }

  /* Chat panel */
  .chat-panel{
    display:flex; flex-direction:column;
    height:100%;
    min-width:0;
  }
  .chat-head{
    padding:18px 28px;
    border-bottom:1px solid var(--line);
    background: rgba(255,255,255,.6);
    -webkit-backdrop-filter:blur(8px);
    backdrop-filter:blur(8px);
    display:flex; align-items:center; gap:14px;
  }
  .chat-head .bot-mark{
    width:38px; height:38px; border-radius:11px;
    background:linear-gradient(135deg, #1f1a16, #0c0a08);
    color:#f6f1e9;
    display:grid; place-items:center;
    box-shadow: 0 6px 14px -6px rgba(25,21,18,.5);
    position:relative;
  }
  .chat-head .bot-mark::after{
    content:""; position:absolute; right:-2px; top:-2px;
    width:10px; height:10px; border-radius:50%;
    background:var(--ok); border:2px solid var(--bg);
  }
  .chat-head h2{
    font-family:var(--serif); font-weight:400;
    font-size:20px; margin:0; letter-spacing:-0.01em;
  }
  .chat-head .sub{ font-size:12.5px; color:var(--muted); margin-top:2px;}

  /* Message thread */
  .chat-thread{
    flex:1;
    overflow-y:auto;
    padding:28px 32px 24px;
    display:flex; flex-direction:column; gap:22px;
    scroll-behavior:smooth;
  }
  .msg{
    display:flex; gap:14px;
    max-width:780px;
  }
  .msg.user{ align-self:flex-end; flex-direction:row-reverse; max-width:680px;}
  .msg .avatar{
    width:34px; height:34px; font-size:11.5px;
    flex-shrink:0;
  }
  .msg.bot .avatar{
    background:linear-gradient(135deg, #1f1a16, #0c0a08);
    color:#f6f1e9;
    border-color: rgba(255,255,255,.5);
  }
  .msg .bubble{
    background:var(--paper);
    border:1px solid rgba(25,21,18,.06);
    border-radius:14px;
    padding:14px 18px;
    font-size:14.5px; line-height:1.55;
    color:var(--ink);
    box-shadow: 0 1px 2px rgba(25,21,18,.04);
    border-top-left-radius: 4px;
  }
  .msg.user .bubble{
    background:#22191b; color:#f6f1e9;
    border-color:transparent;
    border-top-left-radius: 14px;
    border-top-right-radius: 4px;
  }
  .msg .time{
    font-size:10.5px; font-weight:600; color:var(--muted);
    letter-spacing:.05em; text-transform:uppercase;
    margin-top:6px;
  }
  .msg.user .time{ text-align:right;}

  /* Extracted preferences card */
  .prefs{
    margin-top:12px;
    background:#fbf8f3;
    border:1px solid var(--line);
    border-radius:11px;
    padding:14px 16px;
  }
  .prefs .head{
    font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin-bottom:10px;
  }
  .prefs ul{
    list-style:none; margin:0; padding:0;
    display:grid; grid-template-columns: 1fr 1fr; gap:8px 16px;
  }
  .prefs li{
    display:flex; align-items:center; gap:9px;
    font-size:13.5px; color:var(--ink); font-weight:500;
  }
  .prefs li .lbl{ color:var(--muted); font-weight:500;}
  .prefs li .ok{
    width:18px; height:18px; border-radius:50%;
    background:rgba(44,141,74,.18); color:#1f6634;
    display:grid; place-items:center; flex-shrink:0;
  }
  .prefs li .ok svg{ width:10px; height:10px;}

  /* Suggested cards (small variant under bot reply) */
  .sugg-list{
    margin-top:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .sugg-card{
    display:flex; align-items:center; gap:14px;
    padding:12px 14px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:12px;
    text-decoration:none; color:inherit;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .sugg-card:hover{
    border-color:var(--accent);
    box-shadow: 0 1px 2px rgba(25,21,18,.04), 0 12px 28px -18px rgba(192,0,0,.25);
    transform: translateY(-1px);
  }
  .sugg-card .um{
    width:42px; height:42px; border-radius:10px;
    background:#22191b; color:#fff;
    display:grid; place-items:center;
    font-family:var(--serif); font-size:15px; flex-shrink:0;
  }
  .sugg-card .body{ flex:1; min-width:0;}
  .sugg-card .tt{ font-family:var(--serif); font-size:17px; margin:0 0 2px; line-height:1.2;}
  .sugg-card .um-name{ font-size:12.5px; color:var(--muted); display:flex; gap:6px; align-items:center;}
  .sugg-card .um-name svg{ width:10px; height:10px;}
  .sugg-card .stats{
    display:flex; flex-direction:column; gap:2px;
    margin-right:8px; text-align:right;
  }
  .sugg-card .stats .v{ font-size:13px; font-weight:700; color:var(--ink);}
  .sugg-card .stats .l{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em;}
  .sugg-card .fit{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 10px; border-radius:8px;
    background:var(--accent-tint); color:var(--accent);
    font:700 12.5px/1 var(--sans);
  }
  .sugg-card .fit svg{ width:11px; height:11px;}
  .sugg-card .go{ color:var(--muted-2); flex-shrink:0;}
  .sugg-card .go svg{ width:14px; height:14px;}

  /* Composer */
  .composer{
    padding:16px 28px 22px;
    border-top:1px solid var(--line);
    background: rgba(255,255,255,.6);
    -webkit-backdrop-filter:blur(8px);
    backdrop-filter:blur(8px);
  }
  .composer-row{
    display:flex; align-items:flex-end; gap:10px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:8px 10px 8px 14px;
    box-shadow: 0 1px 2px rgba(25,21,18,.04);
  }
  .composer-row:focus-within{
    border-color:var(--accent);
    box-shadow: 0 0 0 4px var(--accent-ring);
  }
  .composer textarea{
    flex:1;
    border:0; outline:0; resize:none;
    background:transparent;
    font:500 14.5px/1.5 var(--sans);
    color:var(--ink);
    padding:10px 4px;
    min-height: 24px; max-height:160px;
  }
  .composer textarea::placeholder{ color:var(--muted-2); font-weight:400;}
  .composer-actions{ display:flex; align-items:center; gap:6px;}
  .composer-actions .ic-btn{
    appearance:none; border:0; background:transparent;
    width:36px; height:36px; border-radius:9px;
    display:grid; place-items:center;
    color:var(--muted);
    cursor:pointer;
  }
  .composer-actions .ic-btn:hover{ background:rgba(25,21,18,.06); color:var(--ink);}
  .composer-actions .ic-btn svg{ width:17px; height:17px;}
  .composer-actions .send{
    background:var(--accent); color:#fff;
    width:auto; padding:0 16px;
    height:36px; border-radius:10px;
    font:600 13px/1 var(--sans);
    display:inline-flex; align-items:center; gap:7px;
    box-shadow: 0 6px 14px -6px rgba(192,0,0,.5);
  }
  .composer-actions .send:hover{ background:#a80000; color:#fff;}
  .composer-actions .send svg{ width:13px; height:13px;}
  .composer-foot{
    margin-top:8px;
    font-size:11px; color:var(--muted);
    display:flex; align-items:center; gap:10px;
  }
  .composer-foot svg{ width:11px; height:11px;}

  /* Quick chips */
  .quick-chips{
    display:flex; flex-wrap:wrap; gap:8px;
    margin-bottom:10px;
  }
  .quick-chips button{
    appearance:none; background:#fbf8f3;
    border:1px solid var(--line);
    color:var(--ink-2);
    padding:7px 12px;
    border-radius:999px;
    font:500 12px/1 var(--sans);
    cursor:pointer;
    display:inline-flex; align-items:center; gap:5px;
  }
  .quick-chips button:hover{ background:#fff; border-color:var(--accent); color:var(--accent);}
  .quick-chips button svg{ width:11px; height:11px; opacity:.7;}
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
</body>
</html>
